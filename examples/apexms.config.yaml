# this file contains the configuration structure for the ApexMS project

metadata:
    version: 1.0
    project: ApexMS
    description: "ApexMS configuration file"

environments:
    flask-app:
        FLASK_APP: app.py
        FLASK_ENV: development
        FLASK_DEBUG: true
        FLASK_RUN_HOST: localhost

    database:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: apexms
        MYSQL_USER: apexms
        MYSQL_PASSWORD: apexms

    django-app:
        DJANGO_SETTINGS_MODULE: apexms.settings
        DJANGO_SECRET_KEY: 123

    redis:
        REDIS_HOST: localhost
        REDIS_PORT: 6379

services:
    flask-app:
        framework: flask
        port: 5000
        environments:
            - flask-app
            - database
        databases:
            - mysql:
        networks:
            - apexms-network
        cache:
            - redis
        message-brokers:
            - rabbitmq
        depend-on:
            - database
            - redis
            - rabbitmq

    django-app:
        framework: django
        port: 8000
        environments:
            - django-app
            - postgres-db
            - redis
        databases:
            - postgres-db
        networks:
            - apexms-network
        cache:
            - redis
        depend-on:
            - postgres-db
            - redis

    fast-api:
        framework: fastapi
        port: 8001
        environments:
            - flask-app
            - redis
        environment:
            - REDIS_HOST=localhost
            - REDIS_PORT=6379
        networks:
            - apexms-network
        message-brokers:
            - rabbitmq
        cache:
            - redis
        depend-on:
            - redis
            - rabbitmq

databases:
    postgres-db:
        database:
            type: postgres
            image: postgres
            ports:
                - 5432:5432
        environments:
            - postgres-data
        volumes:
            - postgres-data
        networks:
            - apexms-network

    database:
        database:
            type: mysql
            ports:
                - 3306:3306
        networks:
            - apexms-network
        environments:
            - database
        environment:
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=apexms
            - MYSQL_USER=apexms
            - MYSQL_PASSWORD=apexms
        volumes:
            - mysql-data
        init-scripts:
            - ./sql:/docker-entrypoint-initdb.d

message-brokers:
    rabbitmq:
        type: rabbitmq
        image: rabbitmq
        ports:
            - 5672:5672
        networks:
            - apexms-network
        environments:
            - RABBITMQ_DEFAULT_USER=guest
            - RABBITMQ_DEFAULT_PASS=guest

containers:
    redis:
        image: redis
        ports:
            - 6379:6379
        networks:
            - apexms-network
        environments:
            - redis

networks:
    apexms-network:

volumes:
    mysql-data:
    postgres-data:

docker:
    enable: true
    docker-compose: true

git:
    repositories:
        django-app:
            remote-url: test.com/django-app.git
            main-branch: main
            init-branches:
                - dev
                - feature

        flask-app:
            remote-url: test.com/flask-app.git
            main-branch: main
            init-branches:
                - dev
                - feature

        fast-api:
            remote-url: test.com/fast-api.git
            main-branch: main
            init-branches:
                - dev
                - feature

    full-project:
        remote-url: test.com/apexms.git
        main-branch: main
        init-branches:
            - dev
            - feature
